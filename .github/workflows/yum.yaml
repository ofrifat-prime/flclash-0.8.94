name: Build Android ARM64 APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  GO_VERSION: '1.24'
  FLUTTER_CHANNEL: master        # Dart >=3.8.0 + RadioGroup/animateColor/Icon.fontWeight = master only
  NDK_VERSION: '28.2.13676358'   # jni plugin এর জন্য highest version
  JAVA_VERSION: '17'

jobs:
  build-android-arm64:
    name: Build Android ARM64 APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: core/go.sum

      - name: Set up Flutter (master channel)
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK ${{ env.NDK_VERSION }}
        run: |
          echo "y" | sdkmanager "ndk;${{ env.NDK_VERSION }}"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      # Keystore — PR এ skip হবে, debug key দিয়ে sign হবে
      - name: Set up signing keystore
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
          cat >> android/local.properties << EOF2
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF2

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('core/go.sum') }}
          restore-keys: go-${{ runner.os }}-

      # ── Go core build ────────────────────────────────────────────────────
      # android/core/build.gradle.kts এর copyNativeLibs task expect করে:
      #   libclash/android/arm64-v8a/libclash.so
      #   libclash/android/includes/arm64-v8a/libclash.h   (Go build output)
      #   libclash/android/includes/arm64-v8a/bride.h      (core/bride.h — manually written)
      # copyNativeLibs → jniLibs/ এ copy করে, তারপর includes/ → src/main/cpp/includes/ এ move করে
      - name: Build libclash.so + headers (arm64-v8a)
        run: |
          TOOLCHAIN=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
          export CC=$TOOLCHAIN/bin/aarch64-linux-android23-clang
          export CXX=$TOOLCHAIN/bin/aarch64-linux-android23-clang++
          export CGO_ENABLED=1
          export GOOS=android
          export GOARCH=arm64
          export CGO_LDFLAGS="-Wl,-soname,libclash.so"

          mkdir -p libclash/android/arm64-v8a
          mkdir -p libclash/android/includes/arm64-v8a

          cd core
          go build \
            -buildmode=c-shared \
            -tags with_gvisor \
            -trimpath \
            -ldflags='-w -s -buildid=' \
            -o ../libclash/android/arm64-v8a/libclash.so \
            .

          mv ../libclash/android/arm64-v8a/libclash.h \
             ../libclash/android/includes/arm64-v8a/libclash.h
          cp bride.h \
             ../libclash/android/includes/arm64-v8a/bride.h

          echo "Output structure:"
          find ../libclash/android -type f | sort

      # ── pubspec fixes ────────────────────────────────────────────────────
      # 1. material_color_utilities: Flutter master pins 0.13.0, pubspec has ^0.11.1
      # 2. re_editor: pub.dev 0.8.0 এ onFocusReceived() নেই, pub get এর পরে patch করব
      - name: Fix pubspec constraints
        run: |
          sed -i 's/material_color_utilities: \^0\.11\.1/material_color_utilities: ^0.13.0/' pubspec.yaml

      - name: Flutter pub get
        run: flutter pub get

      # re_editor 0.8.0 Flutter master এ compile হয় না:
      # DeltaTextInputClient.onFocusReceived() implement নেই।
      # pub cache এ source patch করি — script base64 embed করা (YAML newline issue avoid)
      - name: Patch re_editor onFocusReceived
        run: |
          FILE=$(find ~/.pub-cache -path "*/re_editor-*/lib/src/_code_input.dart" | head -1)
          [ -z "$FILE" ] && echo "ERROR: _code_input.dart not found" && exit 1
          echo "" | base64 -d > /tmp/patch_re_editor.py
          python3 /tmp/patch_re_editor.py "$FILE"

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      # ── Android project patches ──────────────────────────────────────────
      - name: Patch android NDK + local.properties
        run: |
          # libs.versions.toml: ndkVersion 28.0 → 28.2 (jni plugin requires 28.2)
          find android -name "libs.versions.toml" \
            -exec sed -i 's/ndkVersion = "28\.0\.13004108"/ndkVersion = "28.2.13676358"/' {} \;
          # flutter SDK path
          echo "flutter.sdk=$(which flutter | sed 's|/bin/flutter||')" >> android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Build release APK (arm64-v8a)
        run: |
          flutter build apk \
            --release \
            --target-platform android-arm64 \
            --split-per-abi \
            --no-tree-shake-icons \
            --android-skip-build-dependency-validation

      - name: Rename APK
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             dist/FlClash-${VERSION}-arm64.apk
          echo "APK_NAME=FlClash-${VERSION}-arm64.apk" >> $GITHUB_ENV
          echo "APK_VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: dist/${{ env.APK_NAME }}
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: FlClash ${{ env.APK_VERSION }}
          draft: false
          prerelease: false
          files: dist/${{ env.APK_NAME }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
