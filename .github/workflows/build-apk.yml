name: Build APK

on:
  push:
    branches: [ main, develop, feature/* ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flutter 3.32.0 manually
        run: |
          wget -q https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.32.0-stable.tar.xz
          tar xf flutter_linux_3.32.0-stable.tar.xz
          echo "$PWD/flutter/bin" >> $GITHUB_PATH

      - name: Check versions
        run: |
          flutter --version
          dart --version

      - name: Disable analytics
        run: flutter config --no-analytics

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK debug
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FlClashRP-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
